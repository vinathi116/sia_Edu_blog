<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">AI neural network illustration</title>
  <desc id="desc">A glowing neural network with model layers and inference signals.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#020617"/><stop offset=".48" stop-color="#0b1730"/><stop offset="1" stop-color="#111827"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <g opacity=".18" stroke="#60a5fa"><path d="M80 630C300 480 420 570 620 400S920 180 1200 240"/><path d="M0 220C250 300 400 120 620 250s390 110 660-40"/></g>
  <g filter="url(#glow)">
    <g stroke="#38bdf8" stroke-width="3" opacity=".85">
      <path d="M250 180L530 130L800 200L1050 150M250 180L530 300L800 200L1050 320M250 360L530 130L800 420L1050 150M250 360L530 500L800 420L1050 500M250 540L530 300L800 200L1050 320M250 540L530 500L800 420L1050 500"/>
    </g>
    <g fill="#0b1730" stroke="#93c5fd" stroke-width="4">
      <circle cx="250" cy="180" r="34"/><circle cx="250" cy="360" r="34"/><circle cx="250" cy="540" r="34"/>
      <circle cx="530" cy="130" r="34"/><circle cx="530" cy="300" r="34"/><circle cx="530" cy="500" r="34"/>
      <circle cx="800" cy="200" r="34"/><circle cx="800" cy="420" r="34"/>
      <circle cx="1050" cy="150" r="34"/><circle cx="1050" cy="320" r="34"/><circle cx="1050" cy="500" r="34"/>
    </g>
  </g>
  <text x="78" y="100" fill="#e0f2fe" font-family="Sora, Arial" font-size="42" font-weight="700">AI &amp; Machine Learning</text>
  <text x="82" y="146" fill="#93c5fd" font-family="Plus Jakarta Sans, Arial" font-size="22">From features to reliable prediction systems</text>
</svg>
