<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Quantum algorithm circuit visualization</title>
  <desc id="desc">A futuristic quantum circuit with gates and probability waves.</desc>
  <defs><linearGradient id="b" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#020617"/><stop offset=".55" stop-color="#071d36"/><stop offset="1" stop-color="#0b1220"/></linearGradient><filter id="g"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect width="1280" height="720" fill="url(#b)"/>
  <g stroke="#1d4ed8" opacity=".28"><path d="M80 120h1120M80 220h1120M80 320h1120M80 420h1120M80 520h1120"/><path d="M190 80v500M390 80v500M590 80v500M790 80v500M990 80v500"/></g>
  <g filter="url(#g)" font-family="Sora, Arial" font-size="34" font-weight="700">
    <g fill="#071427" stroke="#60a5fa" stroke-width="3"><rect x="170" y="96" width="78" height="48" rx="10"/><rect x="350" y="296" width="78" height="48" rx="10"/><rect x="550" y="196" width="78" height="48" rx="10"/><rect x="750" y="396" width="78" height="48" rx="10"/><rect x="950" y="496" width="78" height="48" rx="10"/></g>
    <text x="188" y="131" fill="#bfdbfe">H</text><text x="368" y="331" fill="#bfdbfe">X</text><text x="568" y="231" fill="#bfdbfe">Q</text><text x="770" y="431" fill="#bfdbfe">F</text><text x="970" y="531" fill="#bfdbfe">M</text>
    <g stroke="#38bdf8" stroke-width="5" fill="none"><path d="M390 120C500 80 520 360 628 220S750 60 828 420 980 560 1120 520"/><path d="M248 120h102M428 320h122M628 220h122M828 420h122"/></g>
    <g fill="#93c5fd"><circle cx="390" cy="120" r="10"/><circle cx="590" cy="220" r="10"/><circle cx="790" cy="420" r="10"/><circle cx="990" cy="520" r="10"/></g>
  </g>
  <text x="70" y="648" fill="#e0f2fe" font-family="Sora, Arial" font-size="42" font-weight="700">Quantum Algorithms</text>
  <text x="72" y="686" fill="#93c5fd" font-family="Plus Jakarta Sans, Arial" font-size="22">Search, optimize, simulate, and verify complex computations</text>
