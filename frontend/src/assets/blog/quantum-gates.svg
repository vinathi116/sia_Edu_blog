<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Quantum gates circuit design illustration</title>
  <desc id="desc">A dark blue quantum circuit diagram with X, H, Z, and controlled gates.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#020617"/><stop offset=".55" stop-color="#08203d"/><stop offset="1" stop-color="#030712"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <g transform="translate(120 120)" filter="url(#glow)">
    <g stroke="#60a5fa" stroke-width="5" opacity=".9"><path d="M0 80h1040M0 200h1040M0 320h1040M0 440h1040"/></g>
    <g fill="#071427" stroke="#93c5fd" stroke-width="4" font-family="Sora, Arial" font-size="34" font-weight="700">
      <rect x="120" y="48" width="70" height="64" rx="10"/><text x="143" y="92" fill="#e0f2fe">H</text>
      <rect x="280" y="168" width="70" height="64" rx="10"/><text x="303" y="212" fill="#e0f2fe">X</text>
      <rect x="440" y="288" width="70" height="64" rx="10"/><text x="464" y="332" fill="#e0f2fe">Z</text>
      <rect x="720" y="408" width="90" height="64" rx="10"/><text x="746" y="452" fill="#e0f2fe">RY</text>
    </g>
    <g stroke="#38bdf8" stroke-width="5" fill="none"><path d="M590 80v240"/><circle cx="590" cy="80" r="12" fill="#38bdf8"/><circle cx="590" cy="320" r="24"/><path d="M920 200v240"/><circle cx="920" cy="200" r="12" fill="#38bdf8"/><circle cx="920" cy="440" r="24"/></g>
    <g fill="#bfdbfe" font-family="Plus Jakarta Sans, Arial" font-size="24"><text x="0" y="30">q0</text><text x="0" y="150">q1</text><text x="0" y="270">q2</text><text x="0" y="390">q3</text></g>
  </g>
  <text x="76" y="650" fill="#e0f2fe" font-family="Sora, Arial" font-size="42" font-weight="700">Quantum Gates &amp; Circuit Design</text>
</svg>
